<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aila's Cyberpunk Weather</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --primary-color: #00ffff;
            --secondary-color: #ff00ff;
            --glow-spread: 10px;
        }
        body {
            background-color: transparent;
            color: var(--primary-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
        }
        /* 天気ウィジェットのスタイル */
        .weather-container {
            position: relative;
            width: 300px;
            padding: 20px;
            border: 2px solid var(--primary-color);
            border-radius: 15px;
            box-shadow: 0 0 var(--glow-spread) var(--primary-color), inset 0 0 15px rgba(0, 255, 255, 0.2);
            background: linear-gradient(135deg, rgba(11, 12, 16, 0.95) 0%, rgba(20, 20, 25, 0.9) 100%);
            text-align: center;
            overflow: hidden;
        }
        /* サイバーパンクなスキャンライン装飾 */
        .weather-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 255, 0.05) 3px,
                rgba(0, 255, 255, 0.05) 4px
            );
            pointer-events: none;
            z-index: 1;
        }
        .city-name {
            font-size: 24px;
            font-weight: bold;
            color: var(--secondary-color);
            text-shadow: 0 0 10px var(--secondary-color);
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }
        .weather-main {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 15px 0;
            position: relative;
            z-index: 2;
        }
        .weather-icon {
            font-size: 50px;
            text-shadow: 0 0 15px var(--primary-color);
        }
        .temperature {
            font-size: 48px;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 0 0 12px var(--primary-color);
        }
        .weather-desc {
            font-size: 16px;
            color: #fff;
            letter-spacing: 1px;
            text-shadow: 0 0 5px var(--primary-color);
            position: relative;
            z-index: 2;
        }
        /* 設定パネル */
        #settings-panel {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid var(--primary-color);
            background: rgba(0, 0, 0, 0.85);
            border-radius: 10px;
            box-shadow: 0 0 15px var(--primary-color);
            text-align: center;
            z-index: 40;
        }
        .setting-row {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        input[type="color"] { cursor: pointer; background: none; border: none; height: 30px; }
        input[type="text"] {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 5px;
            font-family: 'Courier New', Courier, monospace;
            width: 120px;
            text-align: center;
        }
        button {
            background-color: transparent;
            color: var(--secondary-color);
            border: 2px solid var(--secondary-color);
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px var(--secondary-color);
            box-shadow: 0 0 10px var(--secondary-color) inset;
            margin-top: 10px;
        }
        button:hover { background-color: var(--secondary-color); color: #fff; box-shadow: 0 0 20px var(--secondary-color); }
        #url-output {
            margin-top: 15px; word-break: break-all; font-size: 12px; max-width: 400px;
            padding: 10px; background: #000; border: 1px solid var(--primary-color); display: none;
        }
    </style>
</head>
<body>

    <div class="weather-container">
        <div class="city-name" id="display-city">LOADING...</div>
        <div class="weather-main">
            <div class="weather-icon" id="weather-icon">--</div>
            <div class="temperature" id="temperature">--°C</div>
        </div>
        <div class="weather-desc" id="weather-desc">Fetching Data...</div>
    </div>

    <div id="settings-panel">
        <h3 style="margin-top:0;">📡 Weather Settings</h3>
        <div class="setting-row">
            <label>City Name (English):</label>
            <input type="text" id="city-input" value="Tokyo" placeholder="e.g. Tokyo">
        </div>
        <div class="setting-row">
            <label>Primary (Neon):</label>
            <input type="color" id="primary-color" value="#00ffff">
        </div>
        <div class="setting-row">
            <label>Secondary (Accent):</label>
            <input type="color" id="secondary-color" value="#ff00ff">
        </div>
        <button onclick="generateURL()">Notion用URLを発行</button>
        <div id="url-output"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const isEmbed = params.get('embed') === 'true';
        const root = document.documentElement;
        
        // 色設定の適用
        if (params.has('primary')) {
            root.style.setProperty('--primary-color', '#' + params.get('primary'));
            document.getElementById('primary-color').value = '#' + params.get('primary');
        }
        if (params.has('secondary')) {
            root.style.setProperty('--secondary-color', '#' + params.get('secondary'));
            document.getElementById('secondary-color').value = '#' + params.get('secondary');
        }
        
        let targetCity = params.get('city') || 'Tokyo';
        document.getElementById('city-input').value = targetCity;

        if (isEmbed) {
            document.getElementById('settings-panel').style.display = 'none';
        } else {
            const updateColors = () => {
                root.style.setProperty('--primary-color', document.getElementById('primary-color').value);
                root.style.setProperty('--secondary-color', document.getElementById('secondary-color').value);
            };
            document.getElementById('primary-color').addEventListener('input', updateColors);
            document.getElementById('secondary-color').addEventListener('input', updateColors);
            
            // 都市名入力時のリアルタイム更新
            let timeout = null;
            document.getElementById('city-input').addEventListener('input', (e) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => fetchWeather(e.target.value), 1000);
            });
        }

        // 天気情報の取得と表示（完璧なAPI連携処理！）
        async function fetchWeather(city) {
            document.getElementById('display-city').textContent = 'SEARCHING...';
            try {
                // 1. 都市名から緯度経度を取得
                const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
                const geoData = await geoRes.json();
                
                if (!geoData.results || geoData.results.length === 0) {
                    document.getElementById('display-city').textContent = 'ERROR';
                    document.getElementById('weather-desc').textContent = 'City Not Found';
                    return;
                }
                
                const { latitude, longitude, name } = geoData.results[0];
                document.getElementById('display-city').textContent = name;

                // 2. 緯度経度から現在の天気を取得
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                const weatherData = await weatherRes.json();
                const current = weatherData.current_weather;

                document.getElementById('temperature').textContent = Math.round(current.temperature) + '°C';

                // 天気コードの変換
                const code = current.weathercode;
                let icon = '❓';
                let desc = 'Unknown';
                
                if (code === 0) { icon = '☀️'; desc = 'Clear Sky'; }
                else if (code <= 3) { icon = '☁️'; desc = 'Cloudy'; }
                else if (code <= 48) { icon = '🌫️'; desc = 'Foggy'; }
                else if (code <= 57) { icon = '🌧️'; desc = 'Drizzle'; }
                else if (code <= 67) { icon = '☔'; desc = 'Rain'; }
                else if (code <= 77) { icon = '❄️'; desc = 'Snow'; }
                else if (code <= 82) { icon = '🌦️'; desc = 'Showers'; }
                else if (code <= 99) { icon = '⚡'; desc = 'Thunderstorm'; }

                document.getElementById('weather-icon').textContent = icon;
                document.getElementById('weather-desc').textContent = desc;

            } catch (error) {
                document.getElementById('display-city').textContent = 'SYS ERR';
                document.getElementById('weather-desc').textContent = 'API Connection Failed';
            }
        }

        // 初回ロード時の実行
        fetchWeather(targetCity);

        // URL発行
        function generateURL() {
            const primary = document.getElementById('primary-color').value.substring(1);
            const secondary = document.getElementById('secondary-color').value.substring(1);
            const city = encodeURIComponent(document.getElementById('city-input').value);
            
            const ts = new Date().getTime();
            const baseUrl = window.location.origin + window.location.pathname;
            const generatedUrl = `${baseUrl}?embed=true&primary=${primary}&secondary=${secondary}&city=${city}&v=${ts}`;
            
            const outputBox = document.getElementById('url-output');
            outputBox.style.display = 'block';
            outputBox.innerHTML = `<strong>コピーしてNotionに埋め込んでください:</strong><br><br>${generatedUrl}`;
            
            navigator.clipboard.writeText(generatedUrl).then(() => {
                outputBox.innerHTML += `<br><br><span style="color:var(--secondary-color)">クリップボードにコピーしました！</span>`;
            });
        }
    </script>
</body>
</html>
