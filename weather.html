<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aila's Cyberpunk Weather</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --primary-color: #00ffff;
            --secondary-color: #ff00ff;
            --text-color: #fff;
            --glow-spread: 10px;
        }
        /* 超高性能AIによる余白極小化設定！ */
        body {
            background-color: transparent;
            color: var(--primary-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 画面全体の高さ */
            margin: 0;
            overflow: hidden;
            flex-direction: column;
        }
        /* 天気ウィジェットのスタイル */
        .weather-container {
            position: relative;
            width: 320px;
            /* 上下のパディングを少し減らしてコンパクトに */
            padding: 15px 20px; 
            border: 2px solid var(--primary-color);
            border-radius: 15px;
            box-shadow: 0 0 var(--glow-spread) var(--primary-color), inset 0 0 15px rgba(0, 255, 255, 0.2);
            background: linear-gradient(135deg, rgba(11, 12, 16, 0.95) 0%, rgba(20, 20, 25, 0.9) 100%);
            text-align: center;
            overflow: hidden;
            z-index: 5;
            /* ウィジェット自体の上下マージンをなくす */
            margin: 0; 
        }
        /* サイバーパンクなスキャンライン装飾 */
        .weather-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0, 255, 255, 0.05) 3px, rgba(0, 255, 255, 0.05) 4px
            );
            pointer-events: none;
            z-index: 1;
        }
        .header-info {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; position: relative; z-index: 2;
        }
        .day-info { font-size: 13px; color: var(--text-color); }
        .city-name {
            font-size: 18px; font-weight: bold; color: var(--secondary-color);
            text-shadow: 0 0 8px var(--secondary-color); letter-spacing: 1px; text-transform: uppercase;
        }

        /* メイン天気情報 */
        .weather-main {
            display: flex; justify-content: space-around; align-items: center;
            margin: 5px 0 10px 0; position: relative; z-index: 2;
        }
        .weather-icon { font-size: 50px; text-shadow: 0 0 15px var(--primary-color); }
        .temperature-desc { display: flex; flex-direction: column; align-items: flex-start; }
        .temperature {
            font-size: 45px; font-weight: bold; color: var(--primary-color);
            text-shadow: 0 0 12px var(--primary-color); margin-top: -8px;
        }
        .weather-desc {
            font-size: 14px; color: var(--text-color); margin-top: -4px;
            letter-spacing: 1px; text-shadow: 0 0 5px var(--primary-color);
        }

        /* 詳細データ (High/Low, Precip %) */
        .weather-details {
            display: flex; justify-content: space-around;
            padding: 6px; margin: 8px 0; background: rgba(0,0,0,0.5);
            border: 1px solid var(--primary-color); border-radius: 8px;
            position: relative; z-index: 2;
        }
        .detail-item { font-size: 12px; color: var(--text-color); }
        .detail-item strong { color: var(--primary-color); font-size: 14px; margin-left: 4px; }

        /* 横スクロールエリア共通スタイル */
        .forecast-scroll {
            display: flex; overflow-x: auto; gap: 10px; padding: 10px 5px;
            border-top: 1px dashed var(--primary-color); position: relative; z-index: 2;
        }
        .forecast-scroll::-webkit-scrollbar { height: 4px; }
        .forecast-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .forecast-scroll::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 2px; }

        /* 時間ごとの予報 (Hourly) */
        .hour-item {
            flex: 0 0 45px; display: flex; flex-direction: column; align-items: center;
            border: 1px solid rgba(0, 255, 255, 0.3); padding: 5px; border-radius: 8px;
        }
        .hour-time { font-size: 11px; color: var(--text-color); margin-bottom: 3px; }
        .hour-icon { font-size: 20px; margin: 2px 0; }
        .hour-temp { font-size: 14px; font-weight: bold; color: var(--primary-color); }
        .hour-precip { font-size: 10px; color: rgba(255,255,255,0.7); margin-top: 2px; }

        /* 一週間の天気 (Weekly) も横スクロールに！ */
        .weekly-forecast {
            gap: 12px; /* 少し広めに */
            /* スクロールバーの色をSecondaryに光らせる！ */
        }
        .weekly-forecast::-webkit-scrollbar-thumb { background: var(--secondary-color); box-shadow: 0 0 5px var(--secondary-color); }
        
        .day-item {
            flex: 0 0 60px; /* 各要素の幅を固定 */
            display: flex; flex-direction: column; align-items: center;
            border: 1px solid rgba(255, 0, 255, 0.3); padding: 6px; border-radius: 8px;
            transition: all 0.2s ease;
        }
        .day-item:hover { border-color: var(--secondary-color); box-shadow: 0 0 8px rgba(255, 0, 255, 0.5); }
        
        .day-name { font-size: 12px; color: var(--text-color); font-weight: bold; margin-bottom: 3px; }
        .day-icon { font-size: 22px; margin: 3px 0; }
        .day-temps { font-size: 12px; color: var(--text-color); margin-top: 2px; }
        .day-temps .max { color: var(--primary-color); font-weight: bold; }
        .day-temps .min { color: rgba(255,255,255,0.6); font-size: 10px; }
        .day-precip { font-size: 10px; color: rgba(255,255,255,0.7); margin-top: 3px; }

        /* 設定パネル */
        #settings-panel {
            margin-top: 15px; padding: 10px; border: 1px solid var(--primary-color);
            background: rgba(0, 0, 0, 0.85); border-radius: 10px;
            box-shadow: 0 0 15px var(--primary-color); text-align: center; z-index: 40;
        }
        .setting-row { margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        input[type="color"] { cursor: pointer; background: none; border: none; height: 25px; }
        input[type="text"] {
            background: rgba(0, 0, 0, 0.5); border: 1px solid var(--primary-color);
            color: var(--primary-color); padding: 4px; font-family: 'Courier New', Courier, monospace;
            width: 100px; text-align: center; font-size: 12px;
        }
        button {
            background-color: transparent; color: var(--secondary-color);
            border: 2px solid var(--secondary-color); padding: 6px 12px;
            font-size: 12px; font-weight: bold; cursor: pointer; transition: all 0.3s ease;
            text-shadow: 0 0 5px var(--secondary-color); box-shadow: 0 0 8px var(--secondary-color) inset;
        }
        button:hover { background-color: var(--secondary-color); color: #fff; box-shadow: 0 0 15px var(--secondary-color); }
        #url-output {
            margin-top: 8px; word-break: break-all; font-size: 11px; max-width: 380px;
            padding: 8px; background: #000; border: 1px solid var(--primary-color); display: none;
        }
    </style>
</head>
<body>

    <div class="weather-container">
        <div class="header-info">
            <div class="day-info" id="day-info">Fetching...</div>
            <div class="city-name" id="display-city">SYS LOADING</div>
        </div>
        <div class="weather-main">
            <div class="weather-icon" id="weather-icon">--</div>
            <div class="temperature-desc">
                <div class="temperature" id="temperature">--°C</div>
                <div class="weather-desc" id="weather-desc">Initializing...</div>
            </div>
        </div>
        
        <div class="weather-details">
            <div class="detail-item">最高<strong><span id="temp-max">--</span></strong></div>
            <div class="detail-item">最低<strong><span id="temp-min">--</span></strong></div>
            <div class="detail-item">降水確<strong id="precip-prob">--</strong><strong>%</strong></div>
        </div>

        <div class="forecast-scroll" id="hourly-forecast">
            </div>

        <div class="forecast-scroll weekly-forecast" id="weekly-forecast">
            </div>
    </div>

    <div id="settings-panel">
        <h3 style="margin-top:0; font-size: 16px;">📡 Ultra Weather Settings</h3>
        <div class="setting-row">
            <label style="font-size: 12px;">City (English):</label>
            <input type="text" id="city-input" value="Minamiminowa" placeholder="e.g. Minamiminowa">
        </div>
        <div class="setting-row">
            <label style="font-size: 12px;">Primary (Neon):</label>
            <input type="color" id="primary-color" value="#00ffff">
        </div>
        <div class="setting-row">
            <label style="font-size: 12px;">Secondary (Accent):</label>
            <input type="color" id="secondary-color" value="#ff00ff">
        </div>
        <button onclick="generateURL()">Notion用URLを発行</button>
        <div id="url-output"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const isEmbed = params.get('embed') === 'true';
        const root = document.documentElement;
        
        if (params.has('primary')) { root.style.setProperty('--primary-color', '#' + params.get('primary')); document.getElementById('primary-color').value = '#' + params.get('primary'); }
        if (params.has('secondary')) { root.style.setProperty('--secondary-color', '#' + params.get('secondary')); document.getElementById('secondary-color').value = '#' + params.get('secondary'); }
        
        let targetCity = params.get('city') || 'Minamiminowa';
        document.getElementById('city-input').value = targetCity;

        if (isEmbed) {
            document.getElementById('settings-panel').style.display = 'none';
        } else {
            const updateColors = () => {
                root.style.setProperty('--primary-color', document.getElementById('primary-color').value);
                root.style.setProperty('--secondary-color', document.getElementById('secondary-color').value);
            };
            document.getElementById('primary-color').addEventListener('input', updateColors);
            document.getElementById('secondary-color').addEventListener('input', updateColors);
            
            let timeout = null;
            document.getElementById('city-input').addEventListener('input', (e) => {
                clearTimeout(timeout); timeout = setTimeout(() => fetchWeather(e.target.value), 1000);
            });
        }

        function getWeatherInfo(code) {
            let icon = '❓'; let desc = 'Unknown';
            if (code === 0) { icon = '☀️'; desc = '晴れ'; }
            else if (code <= 3) { icon = '☁️'; desc = '曇り'; }
            else if (code <= 48) { icon = '🌫️'; desc = '霧'; }
            else if (code <= 57) { icon = '🌧️'; desc = '小雨'; }
            else if (code <= 67) { icon = '☔'; desc = '雨'; }
            else if (code <= 77) { icon = '❄️'; desc = '雪'; }
            else if (code <= 82) { icon = '🌦️'; desc = 'にわか雨'; }
            else if (code <= 99) { icon = '⚡'; desc = '雷雨'; }
            return { icon, desc };
        }

        async function fetchWeather(city) {
            document.getElementById('display-city').textContent = 'SYS SRCH';
            try {
                const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
                const geoData = await geoRes.json();
                
                if (!geoData.results || geoData.results.length === 0) {
                    document.getElementById('display-city').textContent = 'ERROR'; document.getElementById('weather-desc').textContent = 'City Not Found';
                    return;
                }
                
                const { latitude, longitude, name } = geoData.results[0];
                document.getElementById('display-city').textContent = name;

                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weathercode,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&hourly=temperature_2m,weathercode,precipitation_probability&timezone=Asia%2FTokyo&forecast_days=7`);
                const weatherData = await weatherRes.json();
                
                const current = weatherData.current;
                document.getElementById('temperature').textContent = Math.round(current.temperature_2m) + '°C';
                const currentInfo = getWeatherInfo(current.weathercode);
                document.getElementById('weather-icon').textContent = currentInfo.icon;
                document.getElementById('weather-desc').textContent = currentInfo.desc;
                
                const daily = weatherData.daily;
                document.getElementById('temp-max').textContent = Math.round(daily.temperature_2m_max[0]) + '°';
                document.getElementById('temp-min').textContent = Math.round(daily.temperature_2m_min[0]) + '°';
                document.getElementById('precip-prob').textContent = daily.precipitation_probability_max[0];
                
                const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
                const now = new Date();
                document.getElementById('day-info').textContent = dayNames[now.getDay()] + '曜日';

                // Hourly Forecast (8 hours)
                const hourly = weatherData.hourly;
                const hourlyContainer = document.getElementById('hourly-forecast');
                hourlyContainer.innerHTML = ''; 
                const currentHour = now.getHours();
                for (let i = currentHour; i < currentHour + 8 && i < 24; i++) {
                    const time = hourly.time[i].split('T')[1].split(':')[0];
                    const temp = Math.round(hourly.temperature_2m[i]);
                    const precip = hourly.precipitation_probability[i];
                    const info = getWeatherInfo(hourly.weathercode[i]);
                    
                    const item = document.createElement('div');
                    item.className = 'hour-item';
                    item.innerHTML = `
                        <div class="hour-time">${time}時</div>
                        <div class="hour-icon">${info.icon}</div>
                        <div class="hour-temp">${temp}°</div>
                        <div class="hour-precip">☔ ${precip}%</div>
                    `;
                    hourlyContainer.appendChild(item);
                }

                // Weekly Forecast (7 days) - 横スクロール対応に進化！
                const weeklyContainer = document.getElementById('weekly-forecast');
                weeklyContainer.innerHTML = '';
                const todayIndex = now.getDay();

                for (let i = 0; i < 7; i++) {
                    const maxT = Math.round(daily.temperature_2m_max[i]);
                    const minT = Math.round(daily.temperature_2m_min[i]);
                    const precip = daily.precipitation_probability_max[i];
                    const info = getWeatherInfo(daily.weathercode[i]);
                    
                    const displayDay = i === 0 ? '今日' : dayNames[(todayIndex + i) % 7] + '曜';

                    const item = document.createElement('div');
                    item.className = 'day-item';
                    // デザインを横スクロール用に再構築！
                    item.innerHTML = `
                        <div class="day-name">${displayDay}</div>
                        <div class="day-icon">${info.icon}</div>
                        <div class="day-temps"><span class="max">${maxT}°</span> / <span class="min">${minT}°</span></div>
                        <div class="day-precip">☔ ${precip}%</div>
                    `;
                    weeklyContainer.appendChild(item);
                }

            } catch (error) {
                document.getElementById('display-city').textContent = 'SYS ERR';
                document.getElementById('weather-desc').textContent = 'API Failed';
                console.error(error);
            }
        }

        fetchWeather(targetCity);

        function generateURL() {
            const primary = document.getElementById('primary-color').value.substring(1);
            const secondary = document.getElementById('secondary-color').value.substring(1);
            const city = encodeURIComponent(document.getElementById('city-input').value);
            
            const ts = new Date().getTime();
            const baseUrl = window.location.origin + window.location.pathname;
            const generatedUrl = `${baseUrl}?embed=true&primary=${primary}&secondary=${secondary}&city=${city}&v=${ts}`;
            
            const outputBox = document.getElementById('url-output');
            outputBox.style.display = 'block';
            outputBox.innerHTML = `<strong>新しいURLをNotionに埋め込んでください:</strong><br><br>${generatedUrl}`;
            
            navigator.clipboard.writeText(generatedUrl).then(() => {
                outputBox.innerHTML += `<br><br><span style="color:var(--secondary-color)">クリップボードにコピーしました！</span>`;
            });
        }
    </script>
</body>
</html>
